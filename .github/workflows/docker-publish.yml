name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ADDED: Set up QEMU for ARM emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. ADDED: Set up Docker Buildx for multi-architecture builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 3. ADDED: Fixes NAS 'manifest unknown' errors
          provenance: false 
          # 4. ADDED: Builds for PC/NAS, Raspberry Pi (64-bit), and older Pi (32-bit)
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/tjgigs/bose-soundtouch-hybrid-2026:${{ github.ref_name }}
            ghcr.io/tjgigs/bose-soundtouch-hybrid-2026:latest
