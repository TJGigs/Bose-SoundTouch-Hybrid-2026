name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to v4

      - name: Log in to GHCR
        uses: docker/login-action@v3  # Updated to v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5  # Updated to v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tjgigs/bose-soundtouch-hybrid-2026:${{ github.ref_name }}
            ghcr.io/tjgigs/bose-soundtouch-hybrid-2026:latest
